  All four upstream inputs were present and well-populated; confidence is high. appears_ai_generated_count set to 0 because the upstream conceptual-docs analysis explicitly reports no AI-generation signals on individual documents — the flag was effectively not used, per its own notes. quality_distribution counts 16 files across root_readme (1) + root_docs (8) + doc_sections files (7) matching the upstream metrics.file_count of 16. claude_md_file_count is 2 (CLAUDE.md + AGENTS.md) as reported upstream, even though AGENTS.md is not literally named CLAUDE.md — the AI-process analysis catalogs it as a CLAUDE.md-equivalent since the substantive agent rules live there. ai_generated_doc_evidence_count is 1, counting the single claude_md_indicators entry (readme and conceptual_doc indicators are both empty). work_docs_signals.coverage.has_epics/has_implementation_logs defaulted to false since upstream work-docs coverage uses a different flag set (has_rfcs/has_planning/has_meeting_notes) — no such artifacts exist in either schema interpretation.
