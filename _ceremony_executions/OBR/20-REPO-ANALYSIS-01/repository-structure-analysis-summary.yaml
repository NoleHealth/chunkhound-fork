human_summary: |
  ChunkHound is an actively developed, single-module Python CLI and MCP server (648 files, ~170K LOC) that indexes codebases into DuckDB/LanceDB and exposes semantic/regex search to AI assistants. The repo is self-described as 100% AI-agent-written and is published to PyPI via OIDC trusted publishing, with all modules flagged "alpha" despite the substantial codebase size. What is surprising is the asymmetry between product scope and process overhead: a multi-domain codebase spanning parsers, storage, embeddings, MCP servers, and a background daemon operates with no ADRs, specs, RFCs, planning docs, or decision records — the only "work docs" in the repo are the in-progress OBR analysis ceremony outputs themselves. User-facing documentation is deliberately externalized to chunkhound.github.io, leaving the in-repo doc surface thin (adequate README, topic guides like QWEN3_TUNING.md and MIGRATION_GUIDE.md, module-scoped READMEs) with no field guide, glossary, or user manual. The AI-process footprint is similarly lean: no MCP config or Claude Code agents/skills/subagents, just two `.dwt/ops-scripts/*.sh` ceremony runners plus .dwt/git-ops snippets, and a CLAUDE.md → AGENTS.md redirect convention. The team's working style reads as code-first, externally-documented, and lightly ceremonial — product code carries the heavy LLM integration (chunkhound/autodoc, code_mapper, services/prompts) while the dev process stays flat and test-gated (mandatory smoke tests before commits, full suite before PR).

