notes: |
  Single-module Python package "chunkhound" with a large flat internal structure organized
  by concern (parsers, providers, services, mcp_server, api/cli). Dynamic version via
  hatch-vcs from git tags. Releases to PyPI are automated via GitHub Actions OIDC trusted
  publishing — do not run `uv publish` manually. Tests directory is not a separately
  buildable module but is modeled as a submodule for metric tracking.
