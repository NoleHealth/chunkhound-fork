repository_overview:
  description: ChunkHound is a local-first codebase intelligence CLI and MCP server that indexes codebases into DuckDB/LanceDB using tree-sitter parsers and exposes semantic and regex search to AI assistants. Single-module Python project built entirely by AI agents.
  architectural_patterns:
    - provider/plugin architecture
    - pipeline processing (parse → chunk → embed → index → search)
    - MCP protocol server
    - dependency injection via registry
  domains:
    - name: Parsing
      components:
        - chunkhound/parsers
        - chunkhound/parser.py
        - chunkhound/code_mapper
    - name: Storage
      components:
        - chunkhound/providers/database
        - chunkhound/database.py
        - chunkhound/database_factory.py
    - name: Embeddings & LLM
      components:
        - chunkhound/providers/embeddings
        - chunkhound/providers/llm
        - chunkhound/embeddings.py
        - chunkhound/llm_manager.py
    - name: Interfaces
      components:
        - chunkhound/api/cli
        - chunkhound/mcp_server
    - name: Services
      components:
        - chunkhound/services
        - chunkhound/daemon
        - chunkhound/autodoc
  key_technologies:
    - Python 3.10-3.13
    - DuckDB
    - LanceDB / pylance
    - tree-sitter (multi-language)
    - Model Context Protocol (MCP)
    - Pydantic 2 / pydantic-settings
    - OpenAI, Anthropic, VoyageAI, Google GenAI SDKs
    - hatchling + hatch-vcs
    - uv package manager
build_and_development:
  build_systems:
    - uv
    - hatchling
  recommended_ides:
    - VS Code
  development_commands:
    uv run chunkhound index: Index a directory into the local database
    uv run chunkhound mcp: Start MCP stdio server
    uv run chunkhound mcp http --port 5173: Start MCP HTTP server
    uv run pytest tests/test_smoke.py -v -n auto: Mandatory smoke tests before commits
    uv run pytest tests/ -v: Full test suite (mandatory before pushing)
    uv run ruff check chunkhound: Lint
    uv run ruff format chunkhound: Format
    uv run mypy chunkhound: Type check
    uv run scripts/update_version.py: Create version tag
  environment_requirements:
    - Python >=3.10,<3.14
    - uv package manager
  quality_gates:
    - gate: lint
      command: uv run ruff check chunkhound
      description: Ruff lint check
    - gate: type-check
      command: uv run mypy chunkhound
      description: Mypy static type check
    - gate: smoke-tests
      command: uv run pytest tests/test_smoke.py -v -n auto
      description: Mandatory smoke tests before any commit
    - gate: full-tests
      command: uv run pytest tests/ -v
      description: Full pytest suite, mandatory before pushing a PR
