mcp_section: null
ai_cli_scripts:
  - path: .dwt/ops-scripts/run-ceremony-step.sh
    mode: headless
    cli_tool: claude
    summary: >-
      Invokes `claude -p` headlessly per ceremony step with
      --dangerously-skip-permissions, --session-id, --output-format json, and
      --json-schema. Pipes the step body as stdin context, attaches the step
      context file via --append-system-prompt-file, normalizes the JSON schema
      via a bun helper (claude CLI silently rejects $schema/$defs metadata),
      extracts .structured_output via jq, then commits and pushes the session
      artifacts.
    configures_mcp: false
  - path: .dwt/ops-scripts/run-ceremony-step-loop.sh
    mode: orchestrator
    cli_tool: claude
    summary: >-
      Loops run-ceremony-step.sh across all numbered step folders under
      _envelope/steps/, enforces clean-tree/non-main pre-checks, exports shared
      CEREMONY_EXECUTION_ID/FOLDER so child step runs share identity, throttles
      with STEP_DELAY_SECONDS, and at the end invokes a second headless
      `claude` session (sonnet, --dangerously-skip-permissions) with PR
      standards + template + git log/diff-stat to create a draft PR via `gh pr
      create --draft`.
    configures_mcp: false
prompt_template_collections:
  - path: .dwt/git-ops
    location_type: snippet
    template_count: 5
    summary: >-
      Reusable git-ops prompt fragments loaded by the ceremony scripts as
      --append-system-prompt-file inputs. commit-standards.xml and
      pr-standards.xml are <parameter>-wrapped CDATA blocks defining commit
      types (feat|fix|refactor|chore|docs|test|perf|plan), body-bullet rules
      ("every bullet must carry signal"), and PR conventions; accompanying
      *-instruction.md and pull_request_template.md are consumed by the draft
      PR creation step in the loop.
    inferred_target_artifacts:
      - commit_message
      - other
    snippet_extractions:
      tech_stack_references: []
      ai_tooling:
        - claude CLI via --append-system-prompt-file (commit-standards.xml, pr-standards.xml)
        - gh CLI for `gh pr create --draft` (PR orchestration step)
      mandate_patterns:
        - "ALL sessions produce a commit — write for both humans and downstream LLM agents consuming commits as gitContext"
        - "Commit body bullets must capture intent/decisions, contract/schema changes, rejected trade-offs, and breaking changes; every bullet must carry signal, omit filler"
        - "Plan sessions emphasize decisions made and options rejected; code sessions surface schema/contract changes explicitly"
        - "Commit types restricted to: feat|fix|refactor|chore|docs|test|perf|plan"
    metrics:
      file_count: 5
      line_count: 101
      last_commit_date: '2026-04-20'
      last_commit_sha: 33a17eb
  - path: .dwt/templates/hitl
    location_type: snippet
    template_count: 1
    summary: >-
      Single snippet defining the HITL (human-in-the-loop) decision file
      format: standardized action directives (IMPLEMENT/DEFER/REJECT/EXTEND/
      APPLY/VALIDATE/DOCUMENT), question ID scheme (Q{section}.{number}),
      checkbox-based answer capture, and required frontmatter (doc_type,
      status, execution_id, session_id).
    inferred_target_artifacts:
      - other
    snippet_extractions:
      tech_stack_references:
        - Markdown with YAML frontmatter
      ai_tooling: []
      mandate_patterns:
        - "DEFER ≠ IGNORE — DEFER means 'yes, and add to backlog'; must capture the work item for later action"
        - "Always include '(z) Other' as the last option in every HITL question"
        - "Enclose strings with multiple consecutive underscores in backticks to prevent autoformatter corruption of markdown"
        - "CLI only gates progression on frontmatter status: completed — do NOT include redundant answer tables"
    metrics:
      file_count: 1
      line_count: 98
      last_commit_date: '2026-04-20'
      last_commit_sha: 33a17eb
  - path: _ceremony_executions/OBR/20-REPO-ANALYSIS-01/_envelope/steps
    location_type: playbook
    template_count: 4
    naming_convention: "NN-name/NN-name-{body,context}.txt"
    summary: >-
      Ceremony playbook: numbered step folders (01-code-structure-analysis,
      02-conceptual-docs-analysis, 03-work-docs-analysis,
      04-ai-process-inventory-analysis) each containing a body and context
      file consumed by run-ceremony-step.sh. The body holds the task
      instructions; the context file holds schema definitions, jagged inputs,
      additional operations (e.g. git_commit), and execution_context params
      injected via sed-substitution ({@session_id}, {@execution_id}, etc.)
      before the claude call.
    inferred_target_artifacts:
      - analysis
      - other
    snippet_extractions:
      tech_stack_references:
        - "JSON Schema (draft/2020-12) for structured-output contracts"
        - "YAML for analysis output artifacts"
      ai_tooling:
        - "claude CLI headless mode with --json-schema and --output-format json"
        - "bun-based resolve-schema.ts to strip $schema/$defs metadata claude CLI rejects silently"
        - "jq for extracting .structured_output from raw session JSON"
      mandate_patterns:
        - "Each ceremony step produces a structured-output artifact conforming to its declared schema and a git commit capturing the work"
        - "Step folders must start with a two-digit prefix (NN-) to ensure deterministic execution order"
        - "Pre-check: ceremony cannot run on main/master and requires a clean working tree with no untracked files"
    metrics:
      file_count: 12
      line_count: 0
      last_commit_date: '2026-04-20'
