notes: >-
  Repository is light on AI process infrastructure compared to full DMF-style
  repos: no .mcp.json or .mcps/ directory (mcp_section: null), no Claude Code
  agents/skills/subagents, and no prompt-template library beyond the .dwt/
  git-ops snippets and the ceremony playbook. The AI automation footprint is
  almost entirely the two `.dwt/ops-scripts/*.sh` ceremony runners plus their
  supporting schemas under `.dwt/schemas/`. Jagged inputs from Prompts 1
  (code-structure) and 3 (conceptual-docs) were available and used: the code
  analysis confirmed this is a Python project (not the React/Ink/LangGraph
  stack referenced in typical DMF snippets — no mismatched snippets found
  here to flag), and the conceptual-docs analysis confirmed no field_guide /
  user_manual / glossary exist to cross-reference against generation
  templates. Application-level LLM integration was found at
  chunkhound/autodoc/prompts/, chunkhound/code_mapper/prompts/, and
  chunkhound/services/prompts/ (txt/md/py files used by the running
  product's autodoc/HyDE/synthesis features) — these are product source,
  not AI tooling, and were intentionally excluded per the schema's scope.
  CLAUDE.md line_count reflects the 1-line @AGENTS.md import; AGENTS.md is
  catalogued as a second CLAUDE.md-equivalent entry since it is where the
  non-trivial agent rules actually live. Ceremony-step file_count includes
  body+context+parameterized-context for all 4 step folders; line_count
  left at 0 as these are auto-generated per-invocation rather than
  source-controlled templates. Deep-read extractions in snippet_extractions
  were sourced from commit-standards.xml, hitt-question-format.md, and the
  ceremony runner scripts (which define the playbook contract).
