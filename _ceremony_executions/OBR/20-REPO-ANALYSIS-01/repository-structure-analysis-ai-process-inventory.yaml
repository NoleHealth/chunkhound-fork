patterns:
  - "Ceremony-driven AI automation: numbered step folders under _ceremony_executions/{ID}/_envelope/steps/ are consumed by a generic run-ceremony-step.sh runner; body = stdin, context = --append-system-prompt-file, schema = --json-schema"
  - "Headless claude invocations use --dangerously-skip-permissions, --session-id (UUID), --output-format json, and structured JSON schemas normalized via bun (claude CLI silently rejects $schema/$defs metadata)"
  - "Orchestrator pattern: run-ceremony-step-loop.sh enforces clean-tree/non-main pre-checks, exports shared CEREMONY_EXECUTION_ID across all step children, throttles with STEP_DELAY_SECONDS, and ends with a draft-PR creation claude call"
  - "CLAUDE.md → AGENTS.md redirect: root CLAUDE.md is a single-line @AGENTS.md import; all project rules (modification rules, key commands, release process, DB path gotchas) live in AGENTS.md"
  - "Per-step git commit: each ceremony step commits its own artifacts with message `chore(repo-analysis): add <step> ceremony outputs [<session-id>]` then pushes — used as a safety boundary between steps"
  - "Reusable git-ops prompt fragments in .dwt/git-ops/ (commit-standards.xml, pr-standards.xml, templates) are XML <parameter>-wrapped CDATA attached via --append-system-prompt-file rather than inlined per call"
  - "Slash commands live in .claude/commands/ with argument-hint + description frontmatter and $ARGUMENTS interpolation (qa.md for MCP server QA, review-pr.md for PR review)"
