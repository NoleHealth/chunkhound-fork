notes: |
  Repository is code-centric with documentation deliberately thin in-repo: the primary user-facing documentation is hosted at https://chunkhound.github.io (referenced from README.md). No docs/ directory exists. Root-level Markdown files combine reference (CHANGELOG), contribution (CONTRIBUTING), licensing (LICENSE), AI-agent instructions (AGENTS.md, CLAUDE.md which simply @-includes AGENTS.md), and topical guides (MIGRATION_GUIDE.md, QWEN3_TUNING.md, RELEASING.md). Conceptual documentation under chunkhound/ and tests/ is module-scoped reference. No AI-generation signals observed on individual documents (no "compiled from CLAUDE.md" markers or ceremony output on these docs). Ceremony execution artifacts under _ceremony_executions/ and Claude tooling under .claude/ were excluded per instructions. chunkhound/autodoc/assets/README.md is a Jinja-style template (contains {{TITLE}}); classified as type "other" and quality "stub" since it is not itself project documentation.
