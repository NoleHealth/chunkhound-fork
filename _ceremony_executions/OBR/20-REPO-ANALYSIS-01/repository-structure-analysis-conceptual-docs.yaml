gaps:
  - No in-repo docs/ directory; primary user documentation lives on the external chunkhound.github.io site.
  - No architecture documentation in-repo (README links to hosted "Under the Hood" page).
  - No glossary or field guide.
  - No in-repo user guide or user manual (hosted externally).
  - No API specification files (OpenAPI/GraphQL/gRPC).
  - No CODE_OF_CONDUCT.md.
  - No vision/strategy document.
patterns:
  - External documentation site hosted at chunkhound.github.io; in-repo docs are intentionally minimal.
  - AGENTS.md (with CLAUDE.md re-export) as the canonical AI-agent instruction file.
  - Root-level topic guides (MIGRATION_GUIDE.md, QWEN3_TUNING.md, RELEASING.md) instead of a docs/ hierarchy.
  - Module-level README.md files scoped to operational concerns (operations/, providers/embeddings/) and test subtrees (tests/fixtures/, tests/manual/, tests/unit/research/).
  - Operations directory pairs narrative notes (database_concurrency.md) with runnable experiment scripts.
